<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
<h1>Sign in of users</h1>
<form>
<fieldset>
<legend><h2>personal details:</h2></legend>
<label>First name</label>
<input type="text" id="firstname" name="firstname"><br>
<label>Last name</label>
<input type="text" id="lastname" name="lastname"><br>
<label>Gender</label><br>
<input type="radio" name="subject" value="Female">Female<br>
<input type="radio" name="subject" value="Male">Male<br>
<label>Email</label><br>
<input type="email" id="email" name="email"><br>
<label>Password</label><br>
<input type="password" name="password"><br>
<label>Birthday</label><br>
<input type="date" id="birthday" name="birthday"><br>
<label>Address</label><br>
<textarea rows="5" cols="50" name="description">Enter address here...</textarea><br>
<label>Image</label><br>
<input type="file" name="fileupload" accept="image/*"><br><br>
</fieldset>
<center>
<input type="submit" name="submit" value="Submit">
<input type="reset" name="reset" value="Reset">
</form>
</body>
</html>
